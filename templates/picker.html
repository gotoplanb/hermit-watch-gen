<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermit Watch</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦀</text></svg>">
  <style>
    :root {
      --bg: #1C1C1E;
      --surface: #2C2C2E;
      --text: #F2F2F7;
      --text-secondary: #98989D;
      --calm: #007AFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { text-align: center; padding: 2rem; }
    .crab { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
    .org-buttons { display: flex; flex-direction: column; gap: 1rem; align-items: center; }
    .org-btn {
      display: block;
      width: 260px;
      padding: 1rem 1.5rem;
      background: var(--surface);
      color: var(--text);
      border-radius: 14px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: background 0.15s;
    }
    .org-btn:hover { background: #3A3A3C; }
    .org-btn small { display: block; color: var(--text-secondary); font-size: 0.75rem; font-weight: 400; margin-top: 0.2rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="crab">🦀</div>
    <h1>Hermit Watch</h1>
    <p>Select an org to view</p>
    <div class="org-buttons">
      {% set qs = "?token=" + token + "&org=amex" if token else "?org=amex" %}
      <a class="org-btn" href="{{ qs }}">
        American Express
        <small>amex</small>
      </a>
      {% set qs = "?token=" + token + "&org=multi" if token else "?org=multi" %}
      <a class="org-btn" href="{{ qs }}">
        Multi-Tenant
        <small>multi</small>
      </a>
    </div>
  </div>
</body>
</html>
