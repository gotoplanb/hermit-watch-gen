<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermit Watch</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    :root {
      --serene: #34C759;
      --calm: #007AFF;
      --unsettled: #FFCC00;
      --squall: #FF9500;
      --storm: #FF3B30;
      --unknown: #8E8E93;
      --bg: #1C1C1E;
      --surface: #2C2C2E;
      --text: #F2F2F7;
      --text-secondary: #98989D;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 640px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    .state-indicator {
      width: 120px; height: 120px; border-radius: 50%;
      margin: 1.5rem auto; display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .triage {
      background: var(--surface); border-radius: 12px; padding: 1rem 1.25rem;
      margin-bottom: 1.5rem; line-height: 1.5; font-size: 0.95rem;
    }
    .service-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; }
    .service-row {
      display: flex; align-items: center; gap: 0.75rem;
      background: var(--surface); border-radius: 10px; padding: 0.75rem 1rem;
    }
    .service-dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
    }
    .service-name { font-weight: 500; flex: 1; }
    .service-message { font-size: 0.8rem; color: var(--text-secondary); flex: 2; text-align: right; }
    footer {
      text-align: center; color: var(--text-secondary); font-size: 0.8rem;
      padding-top: 1rem; border-top: 1px solid var(--surface);
    }
    footer a { color: var(--calm); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    .calm-art {
      text-align: center; font-size: 3rem; margin: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="container" x-data="statusApp()" x-init="init()">
    <header>
      <h1>Hermit Watch</h1>
      <div class="state-indicator" :style="`background: var(--${status.worst_state || 'unknown'})`"
           x-text="status.worst_state || 'loading'"></div>
    </header>

    <template x-if="!status.triage">
      <div class="calm-art">🦀</div>
    </template>

    <template x-if="status.triage">
      <div class="triage" x-text="status.triage"></div>
    </template>

    <div class="service-list">
      <template x-for="svc in sortedServices" :key="svc.id">
        <div class="service-row">
          <div class="service-dot" :style="`background: var(--${svc.state || 'unknown'})`"></div>
          <span class="service-name" x-text="svc.display_name"></span>
          <span class="service-message" x-text="svc.message"></span>
        </div>
      </template>
    </div>

    <footer>
      <p>Updated <span x-text="status.updated_at || '—'"></span></p>
      <p style="margin-top: 0.5rem;"><a :href="digestUrl">Latest Digest</a></p>
    </footer>
  </div>

  <script>
    function statusApp() {
      const token = '{{ token }}';
      const qs = token ? `?token=${token}` : '';
      const severity = { storm: 0, squall: 1, unsettled: 2, calm: 3, serene: 4 };

      return {
        status: {},
        get sortedServices() {
          return (this.status.services || []).slice().sort(
            (a, b) => (severity[a.state] ?? 5) - (severity[b.state] ?? 5)
          );
        },
        get digestUrl() {
          return `/digest/latest${qs}`;
        },
        async fetchStatus() {
          try {
            const resp = await fetch(`/status${qs}`);
            if (resp.ok) this.status = await resp.json();
          } catch (e) {
            console.error('Failed to fetch status:', e);
          }
        },
        init() {
          this.fetchStatus();
          setInterval(() => this.fetchStatus(), 30000);
        }
      };
    }
  </script>
</body>
</html>
