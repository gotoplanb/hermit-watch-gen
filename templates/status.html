<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermit Watch</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦀</text></svg>">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    :root {
      --serene: #34C759;
      --calm: #007AFF;
      --unsettled: #FFCC00;
      --squall: #FF9500;
      --storm: #FF3B30;
      --unknown: #8E8E93;
      --bg: #1C1C1E;
      --surface: #2C2C2E;
      --text: #F2F2F7;
      --text-secondary: #98989D;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 640px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
    .org-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .org-switch { font-size: 0.75rem; color: var(--text-secondary); text-decoration: none; }
    .org-switch:hover { color: var(--text); }
    .state-indicator {
      width: 120px; height: 120px; border-radius: 50%;
      margin: 1.5rem auto; display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .triage {
      background: var(--surface); border-radius: 12px; padding: 1rem 1.25rem;
      margin-bottom: 1.5rem; line-height: 1.5; font-size: 0.95rem;
    }
    .service-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; }
    .service-row {
      display: flex; align-items: center; gap: 0.75rem;
      background: var(--surface); border-radius: 10px; padding: 0.75rem 1rem;
    }
    .service-dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
    }
    .service-name { font-weight: 500; flex: 1; }
    .service-message { font-size: 0.8rem; color: var(--text-secondary); flex: 2; text-align: right; }
    .digest-section {
      margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--surface);
    }
    .digest-content {
      background: var(--surface); border-radius: 12px; padding: 1.25rem 1.5rem;
      line-height: 1.7; font-size: 0.9rem;
    }
    .digest-content h2 { font-size: 1.1rem; margin-bottom: 0.75rem; color: var(--text); }
    .digest-content p { margin-bottom: 0.75rem; color: var(--text-secondary); }
    .digest-content strong { color: var(--text); }
    .digest-meta {
      font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.75rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .digest-type {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.05em;
      padding: 0.15rem 0.5rem; border-radius: 4px;
    }
    .digest-type.scheduled { background: var(--surface); color: var(--text-secondary); }
    .digest-type.manual { background: var(--unsettled); color: var(--bg); }
    .no-digest { color: var(--text-secondary); font-size: 0.85rem; font-style: italic; }
    .digest-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .digest-nav-btn {
      background: var(--surface); border: none; color: var(--text); border-radius: 8px;
      padding: 0.35rem 0.75rem; font-size: 0.8rem; cursor: pointer;
    }
    .digest-nav-btn:disabled { color: var(--text-secondary); cursor: default; }
    .digest-nav-count { font-size: 0.75rem; color: var(--text-secondary); }
    footer {
      text-align: center; color: var(--text-secondary); font-size: 0.8rem;
      padding-top: 1rem; margin-top: 1.5rem; border-top: 1px solid var(--surface);
    }
    .calm-art {
      text-align: center; font-size: 3rem; margin: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="container" x-data="statusApp()" x-init="init()">
    <header>
      <h1>Hermit Watch</h1>
      <div class="org-label">{{ org_display }}</div>
      <div class="state-indicator" :style="`background: var(--${displayState})`"
           x-text="displayLabel"></div>
      {% set switch_qs = "?token=" + token if token else "" %}
      <a class="org-switch" href="{{ switch_qs }}">switch org</a>
    </header>

    <template x-if="isStale">
      <div class="triage" style="color: var(--text-secondary);">Status data is stale — no update received in the last hour.</div>
    </template>

    <template x-if="!isStale && !status.triage">
      <div class="calm-art">🦀</div>
    </template>

    <template x-if="!isStale && status.triage">
      <div class="triage" x-text="status.triage"></div>
    </template>

    <div class="digest-meta" x-show="status.updated_at">
      <span x-text="status.updated_at"></span>
      <span x-text="toCentral(status.updated_at)"></span>
      <span x-text="timeAgo(status.updated_at)"></span>
      <span class="digest-type" :class="status.type || 'scheduled'" x-text="(status.type || 'scheduled').toUpperCase()" x-show="status.updated_at"></span>
    </div>

    <div class="service-list">
      <template x-for="svc in sortedServices" :key="svc.id">
        <div class="service-row">
          <div class="service-dot" :style="`background: var(--${isStale ? 'unknown' : (svc.state || 'unknown')})`"></div>
          <span class="service-name" x-text="svc.display_name"></span>
          <span class="service-message" x-text="svc.message"></span>
        </div>
      </template>
    </div>

    <div class="digest-section">
      <template x-if="digest">
        <div>
          <div class="digest-nav">
            <button class="digest-nav-btn" @click="goDigest(digestIndex + 1)" :disabled="digestIndex >= digestTimestamps.length - 1">← Older</button>
            <span class="digest-nav-count" x-text="digestTimestamps.length ? `${digestIndex + 1} of ${digestTimestamps.length}` : ''"></span>
            <button class="digest-nav-btn" @click="goDigest(digestIndex - 1)" :disabled="digestIndex <= 0">Newer →</button>
          </div>
          <div class="digest-meta">
            <span x-text="digest.generated_at"></span>
            <span x-text="toCentral(digest.generated_at)"></span>
            <span x-text="timeAgo(digest.generated_at)"></span>
            <span class="digest-type" :class="digest.type || 'scheduled'" x-text="(digest.type || 'scheduled').toUpperCase()"></span>
          </div>
          <div class="digest-content" x-html="renderMarkdown(digest.content)"></div>
        </div>
      </template>
      <template x-if="!digest">
        <p class="no-digest">No digest available yet.</p>
      </template>
    </div>

    <footer></footer>
  </div>

  <script>
    function toCentral(utcStr) {
      if (!utcStr) return '';
      try {
        const d = new Date(utcStr);
        return d.toLocaleString('en-US', { timeZone: 'America/Chicago', hour: 'numeric', minute: '2-digit', hour12: true }) + ' CT';
      } catch (e) { return ''; }
    }

    function timeAgo(utcStr) {
      if (!utcStr) return '';
      const mins = Math.floor((Date.now() - new Date(utcStr).getTime()) / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      return Math.floor(hrs / 24) + 'd ago';
    }

    function renderMarkdown(md) {
      if (!md) return '';
      return md
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^/, '<p>').replace(/$/, '</p>')
        .replace(/<p><h2>/g, '<h2>').replace(/<\/h2><\/p>/g, '</h2>');
    }

    function statusApp() {
      const token = '{{ token }}';
      const org = '{{ org }}';
      const severity = { storm: 0, squall: 1, unsettled: 2, calm: 3, serene: 4 };

      function buildUrl(path, extra = {}) {
        const p = new URLSearchParams();
        if (token) p.set('token', token);
        if (org) p.set('org', org);
        Object.entries(extra).forEach(([k, v]) => p.set(k, String(v)));
        const qs = p.toString();
        return qs ? `${path}?${qs}` : path;
      }
      const STALE_MS = 60 * 60 * 1000; // 1 hour

      return {
        status: {},
        digest: null,
        digestTimestamps: [],
        digestIndex: 0,
        get isStale() {
          if (!this.status.updated_at) return true;
          const updated = new Date(this.status.updated_at).getTime();
          return (Date.now() - updated) > STALE_MS;
        },
        get displayState() {
          return this.isStale ? 'unknown' : (this.status.worst_state || 'unknown');
        },
        get displayLabel() {
          return this.isStale ? 'unknown' : (this.status.worst_state || 'loading');
        },
        get sortedServices() {
          return (this.status.services || []).slice().sort(
            (a, b) => (severity[a.state] ?? 5) - (severity[b.state] ?? 5)
          );
        },
        async fetchStatus() {
          try {
            const resp = await fetch(buildUrl('/status'));
            if (resp.ok) this.status = await resp.json();
          } catch (e) {
            console.error('Failed to fetch status:', e);
          }
        },
        async fetchDigestList() {
          try {
            const resp = await fetch(buildUrl('/digests', { page_size: 100 }));
            if (resp.ok) {
              const data = await resp.json();
              this.digestTimestamps = data.digests || [];
            }
          } catch (e) {}
        },
        async fetchDigestAt(index) {
          const ts = this.digestTimestamps[index];
          if (!ts) return;
          try {
            const resp = await fetch(buildUrl(`/digest/${encodeURIComponent(ts)}`));
            if (resp.ok) { this.digest = await resp.json(); this.digestIndex = index; }
          } catch (e) {}
        },
        async goDigest(index) {
          if (index < 0 || index >= this.digestTimestamps.length) return;
          await this.fetchDigestAt(index);
        },
        async fetchDigest() {
          await this.fetchDigestList();
          if (this.digestTimestamps.length) await this.fetchDigestAt(0);
        },
        init() {
          this.fetchStatus();
          this.fetchDigest();
          setInterval(() => this.fetchStatus(), 60000);
          setInterval(() => this.fetchDigest(), 300000);
        }
      };
    }
  </script>
</body>
</html>
